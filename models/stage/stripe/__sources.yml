version: 2

sources:
  - name: stripe
    database: RAW
    schema: stripe
    tables: 
      - name: payment
        config:
          loaded_at_field: _batched_at
          freshness:
            warn_after: {count: 12, period: day}
            error_after: {count: 24, period: day}
        columns:
          - name: id
            data_tests:
              - unique
              - not_null